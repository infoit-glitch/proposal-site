<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fdf2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 350px; transition: 0.5s; }
        .icon { font-size: 50px; color: #ff6b6b; margin-bottom: 20px; }
        button { border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; margin: 10px; transition: 0.3s; }
        .btn-yes { background: #ff6b6b; color: white; }
        .btn-no { background: #eee; position: absolute; }
        .hidden { display: none; }
        input, select { padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="card">
    <div id="step1">
        <div class="icon"><i class="fa-solid fa-heart"></i></div>
        <h2>Will you be my date?</h2>
        <button class="btn-yes" onclick="next(2)">Yes</button>
        <button id="no-btn" class="btn-no" onmouseover="move()">No</button>
    </div>

    <div id="step2" class="hidden">
        <div class="icon"><i class="fa-solid fa-calendar-check"></i></div>
        <h3>Choose your adventure</h3>
        <select id="activity">
            <option value="Movie">🎬 Movie Night</option>
            <option value="Food">🍽️ Dinner Date</option>
            <option value="Ride">🚲 Sunset Ride</option>
        </select>
        <button class="btn-yes" style="margin-top:20px;" onclick="next(3)">Next</button>
    </div>

    <div id="step3" class="hidden">
        <div class="icon"><i class="fa-solid fa-clock"></i></div>
        <h3>When should we go?</h3>
        <input type="date" id="datePicker">
        <button class="btn-yes" style="margin-top:20px;" onclick="finish()">Confirm</button>
    </div>

    <div id="step4" class="hidden">
        <div class="icon" style="animation: pop 0.5s;"><i class="fa-solid fa-face-kiss-wink-heart"></i></div>
        <h2 id="finalText">Yay! See you soon!</h2>
    </div>
</div>

<script>
    function move() {
        const b = document.getElementById('no-btn');
        b.style.top = Math.random() * 80 + '%';
        b.style.left = Math.random() * 80 + '%';
    }
    function next(step) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
        if(step == 3) {
            const today = new Date();
            const week = new Date(); week.setDate(today.getDate() + 7);
            document.getElementById('datePicker').min = today.toISOString().split('T')[0];
            document.getElementById('datePicker').max = week.toISOString().split('T')[0];
        }
    }
    function finish() {
        const act = document.getElementById('activity').value;
        const date = document.getElementById('datePicker').value;
        if(!date) { alert("Please pick a date!"); return; }
        document.getElementById('finalText').innerText = `Can't wait for our ${act} on ${date}!`;
        next(4);
        document.body.style.background = "#ffafbd";
    }
</script>
</body>
</html>
