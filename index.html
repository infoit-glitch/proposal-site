<!DOCTYPE html>
<html>
<head>
    <title>Will You Go Out With Me?</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #ffe6e6; transition: background 1s; padding-top: 100px; height: 100vh; margin: 0; }
        #no-btn { position: absolute; padding: 10px 20px; }
        .page { margin-top: 50px; }
        .hidden { display: none; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-page" class="page">
    <h1>Will you go out with me?</h1>
    <button onclick="showNext()">Yes</button>
    <button id="no-btn" onmouseover="moveButton()">No</button>
</div>

<div id="selection-page" class="page hidden">
    <h3>What do you want to do?</h3>
    <select id="activity" style="padding: 10px; font-size: 16px;">
        <option value="Movie">Movie</option>
        <option value="Food">Food</option>
        <option value="Ride">Ride</option>
    </select>
    <br><br>
    <label>Pick a date (within 1 week):</label><br>
    <input type="date" id="datePicker" style="padding: 10px; margin: 10px;">
    <br><br>
    <button onclick="showFinal()">Confirm</button>
</div>

<div id="final-page" class="page hidden">
    <h1 id="message">Thank you! Can't wait! ❤️</h1>
</div>

<script>
    function moveButton() {
        const btn = document.getElementById('no-btn');
        btn.style.top = Math.random() * 80 + '%';
        btn.style.left = Math.random() * 80 + '%';
    }

    function showNext() {
        document.getElementById('main-page').classList.add('hidden');
        document.getElementById('selection-page').classList.remove('hidden');
        
        const today = new Date();
        const nextWeek = new Date();
        nextWeek.setDate(today.getDate() + 7);
        document.getElementById('datePicker').min = today.toISOString().split('T')[0];
        document.getElementById('datePicker').max = nextWeek.toISOString().split('T')[0];
    }

    function showFinal() {
        document.getElementById('selection-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.body.style.background = "linear-gradient(45deg, #ff9a9e, #fad0c4)";
    }
</script>
</body>
</html>
