<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Date?</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff758c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); overflow: hidden; touch-action: manipulation; }
        
        .heart-bg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .heart { position: absolute; color: rgba(255,255,255,0.7); font-size: 20px; animation: move 8s linear infinite; }
        @keyframes move { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 350px; z-index: 1; }
        button { border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; margin: 10px; font-size: 16px; }
        #no-btn { background: #eee; color: #555; position: absolute; }
        .hidden { display: none; }
        
        select, input { padding: 12px; border-radius: 15px; border: 2px solid #ff9a9e; width: 100%; margin: 10px 0; font-size: 16px; }
        .tick { color: #2ecc71; font-size: 40px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="heart-bg" id="hearts"></div>

    <div class="card">
        <div id="step1">
            <h2>Will you be my date? 💖</h2>
            <button onclick="next(2)">Yes</button>
            <button id="no-btn" onmouseover="move()" ontouchstart="move()">No</button>
        </div>

        <div id="step2" class="hidden">
            <h3>Choose adventure!</h3>
            <select id="activity">
                <option value="Movie Night 🎬">Movie Night</option>
                <option value="Dinner Date 🍽️">Dinner Date</option>
                <option value="Sunset Ride 🚲">Sunset Ride</option>
            </select>
            <br><button onclick="next(3)">Next</button>
        </div>

        <div id="step3" class="hidden">
            <h3>Pick a date (within 1 week)</h3>
            <input type="date" id="datePicker" onchange="showTick()">
            <div id="tick" class="tick"><i class="fa-solid fa-circle-check"></i></div>
            <br><button onclick="finish()">Confirm</button>
        </div>

        <div id="step4" class="hidden">
            <h2 style="color: var(--primary);">Thank you! ✨</h2>
            <p id="summary" style="font-size: 1.1rem;"></p>
        </div>
    </div>

<script>
    // Generate Hearts
    const hContainer = document.getElementById('hearts');
    for(let i=0; i<12; i++) {
        const h = document.createElement('div');
        h.innerHTML = '❤️'; h.className = 'heart';
        h.style.left = Math.random() * 90 + '%';
        h.style.animationDelay = Math.random() * 5 + 's';
        hContainer.appendChild(h);
    }

    // Set 1 week limit
    const d = new Date();
    const d7 = new Date(); d7.setDate(d.getDate() + 7);
    document.getElementById('datePicker').min = d.toISOString().split('T')[0];
    document.getElementById('datePicker').max = d7.toISOString().split('T')[0];

    function move() {
        const b = document.getElementById('no-btn');
        b.style.top = Math.random() * 70 + 10 + 'vh';
        b.style.left = Math.random() * 70 + 10 + 'vw';
    }

    function next(step) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function showTick() {
        if(document.getElementById('datePicker').value) {
            document.getElementById('tick').style.display = 'block';
        }
    }

    function finish() {
        const act = document.getElementById('activity').value;
        const date = document.getElementById('datePicker').value;
        if(!date) return alert("Please pick a date!");
        
        document.getElementById('summary').innerHTML = `Looking forward to our:<br><b>${act}</b><br>On: <b>${date}</b>`;
        next(4);
    }
</script>
</body>
</html>
