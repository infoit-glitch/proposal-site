<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Date?</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff758c; --secondary: #ff7eb3; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); overflow: hidden; }
        
        /* Floating Hearts */
        .heart-bg { position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events: none; }
        .heart { position: absolute; color: rgba(255,255,255,0.6); animation: move 10s linear infinite; }
        @keyframes move { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        /* Card */
        .card { background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; width: 300px; z-index: 1; }
        button { border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; margin: 10px; transition: 0.3s; }
        #no-btn { position: absolute; background: #ddd; color: #555; }
        .hidden { display: none; }
        
        /* Advanced Date Picker */
        .date-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        .tick { color: #2ecc71; font-size: 24px; display: none; }
    </style>
</head>
<body>

    <div class="heart-bg" id="hearts"></div>

    <div class="card">
        <!-- Step 1 -->
        <div id="step1">
            <h2>Will you be my date? 💖</h2>
            <button onclick="next(2)">Yes</button>
            <button id="no-btn" onmouseover="move()">No</button>
        </div>

        <!-- Step 2 -->
        <div id="step2" class="hidden">
            <h3>Choose your adventure!</h3>
            <select id="activity" style="padding: 10px; border-radius: 10px;">
                <option value="Movie Night 🎬">Movie Night</option>
                <option value="Dinner Date 🍽️">Dinner Date</option>
                <option value="Sunset Ride 🚲">Sunset Ride</option>
            </select>
            <br><button onclick="next(3)">Next</button>
        </div>

        <!-- Step 3 -->
        <div id="step3" class="hidden">
            <h3>When should we go?</h3>
            <div class="date-box">
                <input type="date" id="datePicker" onchange="showTick()">
                <span id="tick" class="tick"><i class="fa-solid fa-circle-check"></i></span>
            </div>
            <br><button onclick="finish()">Confirm</button>
        </div>

        <!-- Step 4 -->
        <div id="step4" class="hidden">
            <h2 style="color: var(--primary);">Thank you! ✨</h2>
            <p id="summary" style="font-size: 1.2rem;"></p>
        </div>
    </div>

<script>
    // Create Hearts
    const hContainer = document.getElementById('hearts');
    for(let i=0; i<15; i++) {
        const h = document.createElement('div');
        h.innerHTML = '❤️'; h.className = 'heart';
        h.style.left = Math.random() * 100 + '%';
        h.style.animationDelay = Math.random() * 5 + 's';
        hContainer.appendChild(h);
    }

    function move() {
        const b = document.getElementById('no-btn');
        b.style.top = Math.random() * 80 + 'vh';
        b.style.left = Math.random() * 80 + 'vw';
    }

    function next(step) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function showTick() {
        document.getElementById('tick').style.display = 'inline';
    }

    function finish() {
        const act = document.getElementById('activity').value;
        const date = document.getElementById('datePicker').value;
        if(!date) return alert("Please select a date!");
        
        document.getElementById('summary').innerHTML = `You chose: <b>${act}</b><br>On: <b>${date}</b><br>I'm so excited! 😍`;
        next(4);
    }
</script>
</body>
</html>
