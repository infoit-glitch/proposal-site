<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Date?</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #ffe6e6; overflow: hidden; }
        
        /* Floating Hearts Background */
        .hearts-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; pointer-events: none; }
        .heart { position: absolute; color: #ff9a9e; font-size: 20px; animation: float 10s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

        /* Card Styling */
        .card { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 320px; z-index: 1; transition: 0.5s; }
        .icon { font-size: 50px; color: #ff6b6b; margin-bottom: 20px; }
        button { border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; margin: 10px; transition: 0.3s; }
        .btn-yes { background: #ff6b6b; color: white; }
        .btn-no { background: #eee; position: absolute; }
        .hidden { display: none; }
        input, select { padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 90%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="hearts-container" id="hearts"></div>

    <div class="card" id="card">
        <div id="step1">
            <div class="icon"><i class="fa-solid fa-heart"></i></div>
            <h2>Will you be my date?</h2>
            <button class="btn-yes" onclick="next(2)">Yes</button>
            <button id="no-btn" class="btn-no" onmouseover="move()">No</button>
        </div>

        <div id="step2" class="hidden">
            <div class="icon"><i class="fa-solid fa-calendar-check"></i></div>
            <h3>What's the plan?</h3>
            <select id="activity">
                <option value="Movie Night">🎬 Movie Night</option>
                <option value="Dinner">🍽️ Dinner Date</option>
                <option value="Sunset Ride">🚲 Sunset Ride</option>
            </select>
            <button class="btn-yes" style="margin-top:20px;" onclick="next(3)">Next</button>
        </div>

        <div id="step3" class="hidden">
            <div class="icon"><i class="fa-solid fa-calendar-days"></i></div>
            <h3>When should we go?</h3>
            <input type="date" id="datePicker" onchange="updateDateDisplay()">
            <p id="dateDisplay" style="font-weight: bold; color: #ff6b6b;"></p>
            <button class="btn-yes" onclick="finish()">Confirm</button>
        </div>

        <div id="step4" class="hidden">
            <div class="icon"><i class="fa-solid fa-face-kiss-wink-heart"></i></div>
            <h2 id="finalText">Yay! See you soon!</h2>
        </div>
    </div>

<script>
    // Create floating hearts
    const container = document.getElementById('hearts');
    for(let i=0; i<20; i++) {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.className = 'heart';
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDelay = Math.random() * 10 + 's';
        container.appendChild(heart);
    }

    function move() {
        const b = document.getElementById('no-btn');
        b.style.top = Math.random() * 80 + 'vh';
        b.style.left = Math.random() * 80 + 'vw';
    }

    function next(step) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
        if(step == 3) {
            const today = new Date();
            const week = new Date(); week.setDate(today.getDate() + 7);
            document.getElementById('datePicker').min = today.toISOString().split('T')[0];
            document.getElementById('datePicker').max = week.toISOString().split('T')[0];
        }
    }

    function updateDateDisplay() {
        const dateInput = document.getElementById('datePicker').value;
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const dateObj = new Date(dateInput);
        dateObj.setDate(dateObj.getDate() + 1); 
        document.getElementById('dateDisplay').innerText = `${dateInput} (${days[dateObj.getDay()]})`;
    }

    function finish() {
        const act = document.getElementById('activity').value;
        const dateStr = document.getElementById('dateDisplay').innerText;
        if(!dateStr) return alert("Please pick a date!");
        document.getElementById('finalText').innerHTML = `Can't wait for our ${act}!<br>See you on ${dateStr}! ❤️`;
        next(4);
    }
</script>
</body>
</html>
